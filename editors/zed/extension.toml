id = "hoverfly"
name = "Hoverfly Simulation"
version = "0.1.0"
schema_version = 1
authors = ["Jean-Baptiste Terrazzoni <contact@jterrazz.com>"]
description = "Language support for Hoverfly API simulation files (*.hoverfly.json, hoverfly-simulation.json)"
repository = "https://github.com/jterrazz/hoverfly-lsp"

# The language server provided by this extension. The binary is the npm
# package `hoverfly-lsp`, resolved at runtime in src/lib.rs.
[language_servers.hoverfly-lsp]
name = "Hoverfly LSP"
languages = ["Hoverfly Simulation"]

# Map the Zed language name to the LSP `languageId` sent to the server on
# `textDocument/didOpen`, so the server can identify Hoverfly documents.
[language_servers.hoverfly-lsp.language_ids]
"Hoverfly Simulation" = "hoverfly-simulation"

# Hoverfly simulations are JSON. Reuse the canonical tree-sitter-json grammar
# for syntax highlighting. Pinned to v0.24.8, the same 0.24 line Zed bundles,
# to guarantee its highlight queries are compatible.
[grammars.json]
repository = "https://github.com/tree-sitter/tree-sitter-json"
commit = "ee35a6ebefcef0c5c416c0d1ccec7370cfca5a24"
