name: Release

# Tag-driven release. Push an annotated tag `vX.Y.Z` (matching the 0.1.0-style version
# carried by every package/extension manifest) to cut a release:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# The workflow runs the full gate matrix, publishes both npm packages with provenance,
# then creates a GitHub Release carrying the `.vsix` artifact and the editor release notes.
# Marketplace / Open VSX / Zed registry / Claude Code marketplace submissions stay manual
# (no tokens are stored in CI) — see SCAFFOLDING.md "Release pipeline".

on:
  push:
    tags:
      - "v*"

jobs:
  # Full quality gate on the same node matrix as validate.yml. A tag that fails the gate
  # never reaches publish.
  validate:
    name: Validate (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  # Publish the two npm packages (core first — server depends on it), package the VS Code
  # extension, and publish the GitHub Release with the .vsix attached.
  publish:
    name: Publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the .vsix asset
      id-token: write # npm provenance (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Guard: the pushed tag must match the version in every manifest, so a stray tag can
      # never publish a mismatched version.
      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG"
          fail=0
          check() {
            local file="$1" actual
            actual="$(node -p "require('./$file').version")"
            if [ "$actual" != "$TAG" ]; then
              echo "::error file=$file::version $actual != tag $TAG"
              fail=1
            else
              echo "ok: $file @ $actual"
            fi
          }
          check packages/core/package.json
          check packages/server/package.json
          check editors/vscode/package.json
          # Zed (TOML) + Claude Code (JSON) manifests.
          ZED="$(node -p "require('fs').readFileSync('editors/zed/extension.toml','utf8').match(/^version = \"(.*)\"/m)[1]")"
          [ "$ZED" = "$TAG" ] && echo "ok: editors/zed/extension.toml @ $ZED" || { echo "::error::zed extension.toml $ZED != $TAG"; fail=1; }
          CC="$(node -p "require('./editors/claude-code/.claude-plugin/plugin.json').version")"
          [ "$CC" = "$TAG" ] && echo "ok: claude-code plugin.json @ $CC" || { echo "::error::claude-code plugin.json $CC != $TAG"; fail=1; }
          exit $fail

      # @hoverfly-lsp/core first: hoverfly-lsp depends on it. --access public is required for
      # scoped packages; --provenance attaches a signed build attestation (needs id-token).
      - name: Publish @hoverfly-lsp/core
        run: npm publish --workspace @hoverfly-lsp/core --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish hoverfly-lsp
        run: npm publish --workspace hoverfly-lsp --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Package the VS Code extension (server bundle is copied in by esbuild during build).
      # The .vsix is attached to the Release; Marketplace/Open VSX publish stays manual.
      - name: Package VS Code extension
        run: npm run package --workspace hoverfly-lsp-vscode

      - name: Locate .vsix
        id: vsix
        run: echo "path=$(ls editors/vscode/*.vsix)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true
          body: |
            ## hoverfly-lsp ${{ github.ref_name }}

            Language Server for Hoverfly JSON simulation files (`*.hoverfly.json`,
            `hoverfly-simulation.json`).

            ### Published automatically
            - npm `hoverfly-lsp` (the server bin — Zed, IntelliJ/LSP4IJ, Claude Code, Neovim)
            - npm `@hoverfly-lsp/core` (pure analysis library)
            - VS Code extension `.vsix` attached to this release (zero-install, bundles the server)

            ### Manual distribution steps (no tokens in CI)
            - **VS Code Marketplace**: `vsce publish` with the attached `.vsix` (publisher `jterrazz`)
            - **Open VSX**: `ovsx publish` with the attached `.vsix`
            - **Zed**: bump `editors/zed/extension.toml` and open a PR against `zed-industries/extensions`
            - **Claude Code**: the `editors/claude-code` plugin resolves `hoverfly-lsp` from npm; submit/refresh the marketplace entry
            - **SchemaStore**: submit the enhanced schema with `fileMatch: ["*.hoverfly.json", "hoverfly-simulation.json"]`

            See `CHANGELOG.md` for highlights.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
